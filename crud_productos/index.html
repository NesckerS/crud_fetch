<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Productos — Fetch API + PHP OOP + MySQL</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body        { background-color: #f0f2f5; }
        .card-header { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
        .table-hover tbody tr:hover { background-color: #eef2ff; cursor: pointer; }
        .badge-stock-ok   { background-color: #16a34a; }
        .badge-stock-zero { background-color: #dc2626; }
        #btnCancelar { display: none; }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- ── ENCABEZADO ─────────────────────────────────────── -->
    <div class="card shadow mb-4">
        <div class="card-header text-white py-3">
            <h4 class="mb-0">
                <i class="bi bi-box-seam me-2"></i>
                Gestión de Productos
                <small class="fs-6 fw-normal ms-2 opacity-75">
                    CRUD · Fetch API · PHP OOP · MySQL
                </small>
            </h4>
        </div>

        <div class="card-body">

            <!-- ── FORMULARIO ─────────────────────────────── -->
            <div class="row g-3 align-items-end">

                <!-- ID oculto (para edición) -->
                <input type="hidden" id="id" value="0" />

                <!-- Código -->
                <div class="col-md-2">
                    <label for="codigo" class="form-label fw-semibold">
                        Código <span class="text-danger">*</span>
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        id="codigo"
                        name="codigo"
                        maxlength="20"
                        placeholder="Ej: PROD-001"
                        autocomplete="off"
                    />
                </div>

                <!-- Producto -->
                <div class="col-md-4">
                    <label for="producto" class="form-label fw-semibold">
                        Producto <span class="text-danger">*</span>
                    </label>
                    <input
                        type="text"
                        class="form-control"
                        id="producto"
                        name="producto"
                        maxlength="100"
                        placeholder="Nombre del producto"
                        autocomplete="off"
                    />
                </div>

                <!-- Precio -->
                <div class="col-md-2">
                    <label for="precio" class="form-label fw-semibold">
                        Precio <span class="text-danger">*</span>
                    </label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input
                            type="number"
                            class="form-control"
                            id="precio"
                            name="precio"
                            min="0.01"
                            step="0.01"
                            placeholder="0.00"
                        />
                    </div>
                </div>

                <!-- Cantidad -->
                <div class="col-md-2">
                    <label for="cantidad" class="form-label fw-semibold">
                        Cantidad <span class="text-danger">*</span>
                    </label>
                    <input
                        type="number"
                        class="form-control"
                        id="cantidad"
                        name="cantidad"
                        min="1"
                        step="1"
                        placeholder="0"
                    />
                </div>

                <!-- Botones acción -->
                <div class="col-md-2 d-flex gap-2">
                    <button
                        id="btnGuardar"
                        class="btn btn-primary flex-fill"
                        onclick="accionFormulario()"
                    >
                        <i class="bi bi-floppy me-1"></i>
                        <span id="lblBoton">Registrar</span>
                    </button>
                    <button
                        id="btnCancelar"
                        class="btn btn-outline-secondary"
                        onclick="cancelarEdicion()"
                        title="Cancelar edición"
                    >
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
            </div><!-- /row -->

        </div><!-- /card-body -->
    </div><!-- /card formulario -->

    <!-- ── BARRA DE BÚSQUEDA + TABLA ──────────────────────── -->
    <div class="card shadow">
        <div class="card-header text-white py-2 d-flex justify-content-between align-items-center">
            <span><i class="bi bi-table me-2"></i>Listado de Productos</span>

            <div class="input-group input-group-sm" style="max-width:280px">
                <input
                    type="text"
                    class="form-control"
                    id="txtBuscar"
                    placeholder="Buscar por código o nombre…"
                    oninput="buscarProductos(this.value)"
                />
                <button
                    class="btn btn-light btn-sm"
                    onclick="ListarProductos()"
                    title="Ver todos"
                >
                    <i class="bi bi-arrow-clockwise"></i>
                </button>
            </div>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0 align-middle text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyProductos">
                        <tr>
                            <td colspan="6" class="text-muted py-4">
                                <i class="bi bi-hourglass-split me-2"></i>Cargando productos…
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-footer text-muted small d-flex justify-content-between">
            <span id="lblTotal">0 producto(s)</span>
            <span>Haz clic en <i class="bi bi-pencil-square"></i> para editar</span>
        </div>
    </div>

</div><!-- /container -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script principal -->
<script src="script.js"></script>

<!-- Cargar tabla al iniciar -->
<script>
    document.addEventListener("DOMContentLoaded", () => ListarProductos());
</script>

</body>
</html>
